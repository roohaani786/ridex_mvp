name: sarathi
description: "Ride together - Live location sharing app"
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  get: ^4.6.6

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  flutter_polyline_points: ^2.0.1

  # Firebase
  firebase_core: ^3.6.0
  cloud_firestore: ^5.4.4
  firebase_database: ^11.1.4

  # Utils
  uuid: ^4.4.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
#  assets:
#    - assets/images
